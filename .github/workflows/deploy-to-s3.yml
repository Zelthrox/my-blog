name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # === BUILD YOUR STATIC SITE ===
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      # === AWS Authentication (secure OIDC - no secrets) ===
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::893961164201:role/GitHubActions-S3-Blog-Deploy
          aws-region: us-east-1

      # === Deploy to S3 ===
      - name: Sync files to S3
        run: aws s3 sync ./dist s3://andy-kwan-blog-bucket --delete

      # === Clear CloudFront cache ===
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E30FMSGSCH2JCP --paths "/*"